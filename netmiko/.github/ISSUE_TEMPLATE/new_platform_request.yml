name: New Platform Request
description: Request support for a new network device/platform. Do NOT open a PR for a new driver — it will be closed.
labels: ["New Platform"]
body:
  - type: markdown
    attributes:
      value: |
        ## New Platform Request

        Since AI/LLMs can write Python code essentially for free, I am experimenting with a new
        model for Netmiko driver submissions. Rather than accepting code contributions via pull
        requests, end-users submit the behavior of the platform (CLI captures, prompts, commands),
        and I work with an LLM to generate the driver code. This ensures more consistent code is
        added to the Netmiko codebase and makes the review and new-driver workflow easier to manage.

        **Do not open a pull request for a new driver** — PRs for new drivers are not accepted.

        Fill in as much detail as possible. The CLI captures are the most important fields —
        without them the driver cannot be implemented reliably.

  - type: input
    id: vendor
    attributes:
      label: Vendor
      description: The vendor/manufacturer name. e.g. `cisco`, `huawei`, `juniper`
      placeholder: e.g. cisco
    validations:
      required: true

  - type: input
    id: nos
    attributes:
      label: Network Operating System (NOS)
      description: |
        The name of the NOS/firmware. e.g. `ios`, `eos`, `vrp`.
        Do NOT use transport (`ssh`, `telnet`) or device category (`router`, `switch`, `olt`) here —
        those are separate. The device_type will be composed as `{vendor}_{nos}_ssh` / `{vendor}_{nos}_telnet`.
      placeholder: e.g. ios
    validations:
      required: true

  - type: input
    id: device_models
    attributes:
      label: Device model examples are from
      placeholder: e.g. Catalyst 9300, ASR 1001-X

  - type: checkboxes
    id: transport
    attributes:
      label: Transport support
      description: Which transport protocols do you need the Netmiko driver to support?
      options:
        - label: SSH
        - label: Telnet

  - type: checkboxes
    id: modes
    attributes:
      label: CLI modes
      description: Which privileged CLI modes does this device support?
      options:
        - label: Enable mode (privileged exec, e.g. `enable` command)
        - label: Config mode (configuration terminal, e.g. `configure terminal`)

  - type: textarea
    id: ssh_capture
    attributes:
      label: SSH login CLI capture
      description: |
        Paste a raw CLI capture of the full SSH login process — from the moment you connect
        to the point where you see the first prompt. Include any banners or interactive prompts.
        Leave blank if SSH is not supported.
      render: shell

  - type: textarea
    id: mode_transitions_capture
    attributes:
      label: CLI mode transitions capture (required)
      description: |
        Paste a CLI capture showing the complete session:
        login → normal mode → enable mode (if supported) → config mode (if supported)
        → exit config mode → exit enable mode → logout.
        This is the single most valuable field — include it even if incomplete.
      render: shell
    validations:
      required: true

  - type: textarea
    id: telnet_capture
    attributes:
      label: Telnet login CLI capture
      description: |
        Paste a raw CLI capture of the full Telnet login process. Include any banners,
        management-mode selection prompts, or password-change warnings.
        Leave blank if Telnet is not supported.
      render: shell

  - type: input
    id: paging_disable
    attributes:
      label: Disable output paging command
      description: Command to disable `--More--` / paging so full output is returned.
      placeholder: e.g. terminal length 0
    validations:
      required: true

  - type: input
    id: terminal_width
    attributes:
      label: Set terminal width command
      description: Command to set terminal width to prevent line wrapping.
      placeholder: e.g. terminal width 511
    validations:
      required: true

  - type: textarea
    id: quirks
    attributes:
      label: CLI oddities or other behavior issues
      description: |
        Document anything unusual: interactive prompts during login, default-password warnings,
        management-mode selection menus, ANSI escape codes in output, commit-based config model,
        non-standard prompt characters, or any other quirks that would affect the driver.
