<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in NetPanel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: #F6F6F6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── LOGO HEADER: area logo di atas card login ── */
    .login-header {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 28px;
    }

    .login-brand-icon {
      width: 32px;
      height: 32px;
      background: #F48120;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .login-brand-name {
      font-size: 17px;
      font-weight: 700;
      color: #1D1D1D;
      letter-spacing: -.3px;
    }

    /* ── LOGIN CARD: kotak putih tempat form username & password ── */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #FFFFFF;
      border: 1px solid #D9D9D9;
      border-radius: 8px;
      padding: 36px 32px;
    }

    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: #1D1D1D;
      letter-spacing: -.3px;
      margin-bottom: 5px;
    }

    .login-subtitle {
      font-size: 13.5px;
      color: #6D6D6D;
      margin-bottom: 28px;
    }

    /* Label field form: huruf kecil semua, uppercase via CSS */
    .f-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6D6D6D;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 5px;
      margin-top: 16px;
    }

    .f-label:first-of-type {
      margin-top: 0;
    }

    /* Input text / password di form login */
    .f-input {
      width: 100%;
      padding: 9px 12px;
      background: #FFFFFF;
      border: 1px solid #D9D9D9;
      border-radius: 4px;
      color: #1D1D1D;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      transition: border-color .15s, box-shadow .15s;
    }

    .f-input:focus {
      outline: none;
      border-color: #0051C3;
      box-shadow: 0 0 0 2px rgba(0, 81, 195, .12);
    }

    .f-input::placeholder {
      color: #B5B5B5;
    }

    /* Tombol submit login — full width, biru */
    .f-submit {
      width: 100%;
      margin-top: 24px;
      padding: 10px;
      background: #0051C3;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: -.1px;
      transition: background .15s;
    }

    .f-submit:hover {
      background: #003E9C;
    }

    .f-submit:active {
      opacity: .9;
    }

    /* ── FOOTER PILLS: badge kecil di bawah form yang nampilin tech stack ── */
    .login-footer {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #EBEBEB;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tech-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      background: #F6F6F6;
      border: 1px solid #D9D9D9;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 500;
      color: #6D6D6D;
    }

    /* ── BOTTOM NOTE: catatan kecil di bagian paling bawah halaman ── */
    .login-note {
      margin-top: 20px;
      font-size: 12px;
      color: #9D9D9D;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="login-header">
    <div class="login-brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="6" height="6" rx="1" />
        <rect x="16" y="2" width="6" height="6" rx="1" />
        <rect x="2" y="16" width="6" height="6" rx="1" />
        <rect x="16" y="16" width="6" height="6" rx="1" />
        <line x1="8" y1="5" x2="16" y2="5" />
        <line x1="8" y1="19" x2="16" y2="19" />
        <line x1="5" y1="8" x2="5" y2="16" />
        <line x1="19" y1="8" x2="19" y2="16" />
      </svg>
    </div>
    <span class="login-brand-name">NetPanel</span>
  </div>

  <div class="login-card">
    <h1 class="login-title">Sign in to NetPanel</h1>
    <p class="login-subtitle">Network Automation Panel with netmiko!
    </p>

    <!-- Form login — kirim POST, server akan cek username & password -->
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <label class="f-label" for="username">Username</label>
      <input class="f-input" id="username" name="username" autocomplete="username" required
        placeholder="Enter username">

      <label class="f-label" for="password">Password</label>
      <input class="f-input" id="password" name="password" type="password" autocomplete="current-password" required
        placeholder="Enter password">

      <button type="submit" class="f-submit">Sign in</button>
    </form>

    <div class="login-footer">
      <span class="tech-pill">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Cisco IOS
      </span>
      <span class="tech-pill">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        Netmiko SSH
      </span>
      <span class="tech-pill">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg>
        Flask
      </span>
    </div>
  </div>
  <!-- Flash messages dari server disimpan di sini sebagai JSON, lalu dibaca JS -->
  <script id="flashData" type="application/json">{{ get_flashed_messages(with_categories=true) | tojson }}</script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script>
    /* showToast: tampilkan notifikasi pop-up, warna sesuai kategori */
    function showToast(msg, cat) {
      var c = { success: "#107934", error: "#C01717", warning: "#B45309", info: "#0051C3" };
      Toastify({
        text: msg, duration: 5000, close: true, gravity: "bottom", position: "right",
        style: { background: c[cat] || c.info, borderRadius: "6px", fontWeight: "600", fontSize: "13px" }
      }).showToast();
    }

    /* Saat halaman selesai load, baca flash messages dari server dan tampilkan satu per satu */
    document.addEventListener("DOMContentLoaded", function () {
      var flashData = document.getElementById("flashData");
      if (flashData && flashData.textContent.trim()) {
        try {
          JSON.parse(flashData.textContent).forEach(function (item) {
            showToast(item[1], item[0]);
          });
        } catch (e) { }
      }
    });
  </script>
</body>

</html>
